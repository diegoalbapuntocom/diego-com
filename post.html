<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>diego.com</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400;1,500&family=Jost:wght@200;300;400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --cream: #f4efe8; --cream-2: #ede8e0; --text: #1c1714;
      --muted: #7a6e65; --faint: #b0a69c; --accent: #b07045;
      --border: #ddd6cc; --serif: 'Cormorant Garamond', Georgia, serif;
      --sans: 'Jost', system-ui, sans-serif;
    }
    html { scroll-behavior: smooth; }
    body { font-family: var(--sans); background: var(--cream); color: var(--text); font-weight: 300; -webkit-font-smoothing: antialiased; }
    a { text-decoration: none; color: inherit; }
    nav { position: sticky; top: 0; z-index: 200; background: rgba(244,239,232,0.92); backdrop-filter: blur(12px); border-bottom: 1px solid var(--border); }
    .nav-inner { max-width: 1100px; margin: 0 auto; padding: 0 2.5rem; height: 64px; display: flex; align-items: center; justify-content: space-between; }
    .logo { font-family: var(--serif); font-size: 22px; font-weight: 400; }
    .nav-links { display: flex; gap: 2.5rem; list-style: none; }
    .nav-links a { font-size: 11px; font-weight: 400; letter-spacing: 0.14em; text-transform: uppercase; color: var(--muted); transition: color 0.2s; }
    .nav-links a:hover { color: var(--text); }
    .article-wrap { max-width: 720px; margin: 0 auto; padding: 4rem 2rem 7rem; }
    .back-link { display: inline-flex; align-items: center; gap: 8px; font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); margin-bottom: 3rem; transition: color 0.2s; }
    .back-link:hover { color: var(--accent); }
    .back-link svg { width: 14px; height: 14px; }
    .tag { display: inline-block; font-size: 10px; font-weight: 400; letter-spacing: 0.14em; text-transform: uppercase; color: var(--accent); margin-bottom: 1.25rem; }
    .article-title { font-family: var(--serif); font-size: clamp(36px, 5vw, 58px); font-weight: 400; line-height: 1.1; letter-spacing: -0.02em; margin-bottom: 1.5rem; }
    .article-meta { font-size: 11px; color: var(--faint); letter-spacing: 0.06em; margin-bottom: 3rem; padding-bottom: 2rem; border-bottom: 1px solid var(--border); }
    .cover-img { width: 100%; max-height: 520px; object-fit: cover; border-radius: 2px; margin-bottom: 3rem; border: 1px solid var(--border); display: block; }
    .ad-banner { background: var(--cream-2); border: 1px solid var(--border); border-radius: 2px; height: 90px; display: flex; align-items: center; justify-content: center; margin: 3rem 0; }
    .ad-label { font-size: 10px; font-weight: 400; letter-spacing: 0.16em; text-transform: uppercase; color: var(--faint); }
    .article-body { font-size: 18px; line-height: 1.85; color: #2a211c; }
    .article-body p { margin-bottom: 1.75rem; }
    .article-body h2 { font-family: var(--serif); font-size: 30px; font-weight: 400; margin: 3rem 0 1.25rem; letter-spacing: -0.01em; }
    .article-body h3 { font-family: var(--serif); font-size: 22px; font-weight: 400; margin: 2rem 0 0.75rem; }
    .article-body blockquote { border-left: 2px solid var(--accent); margin: 2.5rem 0; padding: 0.5rem 0 0.5rem 2rem; color: var(--muted); font-style: italic; font-family: var(--serif); font-size: 24px; line-height: 1.5; }
    .article-body img { width: 100%; border-radius: 2px; margin: 2rem 0; border: 1px solid var(--border); display: block; }
    footer { border-top: 1px solid var(--border); background: var(--cream-2); }
    .footer-inner { max-width: 1100px; margin: 0 auto; padding: 1.75rem 2.5rem; display: flex; justify-content: space-between; align-items: center; }
    .footer-logo { font-family: var(--serif); font-size: 16px; font-weight: 400; color: var(--muted); }
    .footer-copy { font-size: 11px; color: var(--faint); }
    @media (max-width: 600px) { .article-title { font-size: 34px; } .nav-links { gap: 1.25rem; } .nav-inner { padding: 0 1.25rem; } .article-wrap { padding: 3rem 1.25rem 5rem; } }
  </style>
</head>
<body>
  <nav>
    <div class="nav-inner">
      <a href="index.html" class="logo">diego.com</a>
      <ul class="nav-links">
        <li><a href="menu.html">Menú</a></li>
        <li><a href="galeria.html">Galería</a></li>
        <li><a href="shop.html">Shop</a></li>
        <li><a href="contacto.html">Contacto</a></li>
      </ul>
    </div>
  </nav>
  <div class="article-wrap" id="article-content">
    <p style="color:var(--faint);font-size:14px;">Cargando entrada...</p>
  </div>
  <footer>
    <div class="footer-inner">
      <span class="footer-logo">diego.com</span>
      <span class="footer-copy" id="footer-year"></span>
    </div>
  </footer>
  <script>
    document.getElementById('footer-year').textContent = '© ' + new Date().getFullYear() + ' · Todos los derechos reservados';
    const id = new URLSearchParams(window.location.search).get('id');
    fetch('posts.json').then(r => r.json()).then(data => {
      const post = (data.posts || []).find(p => p.id === id);
      if (!post) { document.getElementById('article-content').innerHTML = '<p style="color:var(--faint);font-size:14px;">Entrada no encontrada.</p>'; return; }
      document.title = post.title + ' · diego.com';
      document.getElementById('article-content').innerHTML = `
        <a href="index.html" class="back-link">
          <svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M9 2L4 7l5 5"/></svg>
          Volver al inicio
        </a>
        <span class="tag">${post.category}</span>
        <h1 class="article-title">${post.title}</h1>
        <p class="article-meta">${post.date} · ${post.readTime} de lectura</p>
        ${post.image ? `<img src="${post.image}" class="cover-img" alt="${post.title}" />` : ''}
        <div class="ad-banner"><span class="ad-label">Publicidad</span></div>
        <div class="article-body">${post.content}</div>`;
    }).catch(() => {
      document.getElementById('article-content').innerHTML = '<p style="color:var(--faint);font-size:14px;">No se pudo cargar la entrada.</p>';
    });
  </script>
</body>
</html>
