<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>diego.com</title>
  <meta name="description" content="Ideas, arte y reflexiones sin filtro." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400;1,500&family=Jost:wght@200;300;400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --cream:    #f4efe8;
      --cream-2:  #ede8e0;
      --cream-3:  #e5dfd5;
      --text:     #1c1714;
      --muted:    #7a6e65;
      --faint:    #b0a69c;
      --accent:   #b07045;
      --border:   #ddd6cc;
      --serif:    'Cormorant Garamond', Georgia, serif;
      --sans:     'Jost', system-ui, sans-serif;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: var(--sans);
      background: var(--cream);
      color: var(--text);
      font-weight: 300;
      -webkit-font-smoothing: antialiased;
    }

    a { text-decoration: none; color: inherit; }

    /* ── NAV ── */
    nav {
      position: sticky;
      top: 0;
      z-index: 200;
      background: rgba(244,239,232,0.92);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
    }
    .nav-inner {
      max-width: 1100px;
      margin: 0 auto;
      padding: 0 2.5rem;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .logo {
      font-family: var(--serif);
      font-size: 22px;
      font-weight: 400;
      letter-spacing: -0.01em;
      color: var(--text);
    }
    .nav-links {
      display: flex;
      gap: 2.5rem;
      list-style: none;
    }
    .nav-links a {
      font-size: 11px;
      font-weight: 400;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--muted);
      transition: color 0.2s;
      position: relative;
      padding-bottom: 2px;
    }
    .nav-links a::after {
      content: '';
      position: absolute;
      left: 0; bottom: -2px;
      width: 0; height: 1px;
      background: var(--accent);
      transition: width 0.25s;
    }
    .nav-links a:hover { color: var(--text); }
    .nav-links a:hover::after { width: 100%; }

    /* ── HERO ── */
    .hero {
      min-height: 88vh;
      display: grid;
      grid-template-columns: 1fr 1fr;
      position: relative;
      overflow: hidden;
    }
    .hero-left {
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 5rem 3.5rem 5rem 3rem;
      max-width: 600px;
    }
    .hero-left h1 {
      font-family: var(--serif);
      font-size: clamp(48px, 6vw, 80px);
      font-weight: 400;
      line-height: 1.08;
      letter-spacing: -0.02em;
      margin-bottom: 1.5rem;
    }
    .hero-left h1 em {
      font-style: italic;
      color: var(--accent);
      font-weight: 300;
    }
    .hero-rule {
      width: 36px;
      height: 1px;
      background: var(--accent);
      margin-bottom: 1.5rem;
    }
    .hero-desc {
      font-size: 14px;
      line-height: 1.8;
      color: var(--muted);
      max-width: 340px;
      margin-bottom: 2.5rem;
    }
    .hero-cta {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      font-size: 11px;
      font-weight: 400;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--text);
      border-bottom: 1px solid var(--text);
      padding-bottom: 3px;
      transition: color 0.2s, border-color 0.2s;
    }
    .hero-cta:hover { color: var(--accent); border-color: var(--accent); }
    .hero-cta svg { width: 16px; height: 16px; }

    .hero-right {
      position: relative;
      overflow: hidden;
      background: var(--cream-2);
    }
    .hero-right img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    /* placeholder when no hero image */
    .hero-placeholder {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--cream-2);
    }
    .hero-placeholder svg { opacity: 0.15; }

    /* ── AD ── */
    .ad-wrap {
      background: var(--cream-2);
      border-top: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
    }
    .ad-inner {
      max-width: 1100px;
      margin: 0 auto;
      padding: 1.25rem 2.5rem;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 90px;
    }
    .ad-label {
      font-size: 10px;
      font-weight: 400;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--faint);
    }

    /* ── SECTION LABEL ── */
    .section-label {
      font-size: 10px;
      font-weight: 400;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--faint);
      padding-bottom: 1rem;
      border-bottom: 1px solid var(--border);
      margin-bottom: 2rem;
    }

    /* ── CONTENT AREA ── */
    .content {
      max-width: 1100px;
      margin: 0 auto;
      padding: 0 2.5rem;
    }

    /* ── FEATURED ── */
    .featured-section { padding: 4rem 0 2rem; }
    .featured-card {
      display: grid;
      grid-template-columns: 1fr 1fr;
      border: 1px solid var(--border);
      border-radius: 4px;
      overflow: hidden;
      transition: box-shadow 0.25s;
      cursor: pointer;
      background: var(--cream);
    }
    .featured-card:hover {
      box-shadow: 0 8px 40px rgba(28,23,20,0.08);
    }
    .featured-img {
      background: var(--cream-2);
      min-height: 320px;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    .featured-img img { width: 100%; height: 100%; object-fit: cover; }
    .featured-content {
      padding: 3rem;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }
    .tag {
      display: inline-block;
      font-size: 10px;
      font-weight: 400;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 1.25rem;
    }
    .featured-content h2 {
      font-family: var(--serif);
      font-size: 32px;
      font-weight: 400;
      line-height: 1.2;
      letter-spacing: -0.01em;
      margin-bottom: 1rem;
    }
    .featured-content p {
      font-size: 14px;
      line-height: 1.7;
      color: var(--muted);
      margin-bottom: 1.5rem;
    }
    .meta {
      font-size: 11px;
      color: var(--faint);
      letter-spacing: 0.06em;
    }

    /* ── POSTS GRID ── */
    .posts-section { padding: 3rem 0 5rem; }
    .posts-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1.5rem;
    }
    .post-card {
      border: 1px solid var(--border);
      border-radius: 4px;
      overflow: hidden;
      cursor: pointer;
      transition: box-shadow 0.25s;
      background: var(--cream);
    }
    .post-card:hover { box-shadow: 0 6px 28px rgba(28,23,20,0.08); }
    .post-card-img {
      background: var(--cream-2);
      height: 180px;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    .post-card-img img { width: 100%; height: 100%; object-fit: cover; }
    .post-card-body { padding: 1.25rem 1.5rem 1.5rem; }
    .post-card-body h3 {
      font-family: var(--serif);
      font-size: 20px;
      font-weight: 400;
      line-height: 1.3;
      margin: 0.5rem 0 0.5rem;
    }
    .post-card-body p {
      font-size: 13px;
      color: var(--muted);
      line-height: 1.6;
      margin-bottom: 0.75rem;
    }
    .empty {
      grid-column: 1/-1;
      text-align: center;
      padding: 4rem 0;
      font-size: 14px;
      color: var(--faint);
    }

    /* ── FOOTER ── */
    footer {
      border-top: 1px solid var(--border);
      background: var(--cream-2);
    }
    .footer-inner {
      max-width: 1100px;
      margin: 0 auto;
      padding: 1.75rem 2.5rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .footer-logo { font-family: var(--serif); font-size: 16px; font-weight: 400; color: var(--muted); }
    .footer-copy { font-size: 11px; color: var(--faint); letter-spacing: 0.04em; }

    /* ── MOBILE ── */
    @media (max-width: 768px) {
      .hero { grid-template-columns: 1fr; min-height: auto; }
      .hero-right { height: 260px; }
      .hero-left { padding: 3.5rem 1.5rem 3rem; }
      .hero-left h1 { font-size: 44px; }
      .featured-card { grid-template-columns: 1fr; }
      .featured-img { min-height: 220px; }
      .posts-grid { grid-template-columns: 1fr; }
      .nav-links { gap: 1.25rem; }
      .nav-links a { font-size: 10px; letter-spacing: 0.1em; }
      .nav-inner { padding: 0 1.25rem; }
      .content { padding: 0 1.25rem; }
    }
  </style>
</head>
<body>

  <!-- NAV -->
  <nav>
    <div class="nav-inner">
      <a href="index.html" class="logo">diego.com</a>
      <ul class="nav-links">
        <li><a href="menu.html">Menú</a></li>
        <li><a href="galeria.html">Galería</a></li>
        <li><a href="shop.html">Shop</a></li>
        <li><a href="contacto.html">Contacto</a></li>
      </ul>
    </div>
  </nav>

  <!-- HERO -->
  <section class="hero">
    <div class="hero-left">
      <h1>Ideas, arte<br>y <em>reflexiones</em><br>sin filtro.</h1>
      <div class="hero-rule"></div>
      <p class="hero-desc">Un espacio para explorar el proceso creativo, compartir ilustraciones y escribir sobre lo que vale la pena pensar dos veces.</p>
      <a href="#blog" class="hero-cta">
        Entrar al blog
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M3 8h10M9 4l4 4-4 4"/>
        </svg>
      </a>
    </div>
    <div class="hero-right">
      <!-- Reemplaza el div.hero-placeholder con: <img src="tu-imagen.jpg" alt="hero" /> -->
      <div class="hero-placeholder">
        <svg width="120" height="160" viewBox="0 0 120 160" fill="none" xmlns="http://www.w3.org/2000/svg">
          <ellipse cx="60" cy="140" rx="4" ry="20" stroke="#7a6e65" stroke-width="1"/>
          <path d="M60 120 Q40 90 20 60 Q50 70 60 95" stroke="#7a6e65" stroke-width="1" fill="none"/>
          <path d="M60 110 Q80 80 100 50 Q70 65 60 90" stroke="#7a6e65" stroke-width="1" fill="none"/>
          <path d="M60 100 Q30 65 35 30" stroke="#7a6e65" stroke-width="1" fill="none"/>
          <path d="M60 95 Q90 60 85 25" stroke="#7a6e65" stroke-width="1" fill="none"/>
        </svg>
      </div>
    </div>
  </section>

  <!-- ADSENSE -->
  <div class="ad-wrap">
    <div class="ad-inner">
      <!-- Reemplaza este comentario con tu código de Google AdSense -->
      <span class="ad-label">Publicidad</span>
    </div>
  </div>

  <!-- BLOG -->
  <div class="content" id="blog">

    <section class="featured-section">
      <p class="section-label">Entrada destacada</p>
      <div id="featured-post"></div>
    </section>

    <section class="posts-section">
      <p class="section-label">Últimas entradas</p>
      <div class="posts-grid" id="posts-grid"></div>
    </section>

  </div>

  <!-- FOOTER -->
  <footer>
    <div class="footer-inner">
      <span class="footer-logo">diego.com</span>
      <span class="footer-copy" id="footer-year"></span>
    </div>
  </footer>

  <script>
    document.getElementById('footer-year').textContent =
      '© ' + new Date().getFullYear() + ' · Todos los derechos reservados';

    fetch('posts.json')
      .then(r => r.json())
      .then(data => {
        const posts = data.posts || [];

        if (!posts.length) {
          document.getElementById('featured-post').innerHTML =
            '<p style="color:var(--faint);font-size:14px;padding:2rem 0;">Aún no hay entradas publicadas.</p>';
          return;
        }

        const f = posts[0];
        document.getElementById('featured-post').innerHTML = `
          <a href="post.html?id=${f.id}" class="featured-card">
            <div class="featured-img">
              ${f.image
                ? `<img src="${f.image}" alt="${f.title}" />`
                : `<svg width="60" height="80" viewBox="0 0 60 80" fill="none"><ellipse cx="30" cy="72" rx="2" ry="8" stroke="#b0a69c" stroke-width="1"/><path d="M30 64 Q18 48 8 28 Q26 36 30 52" stroke="#b0a69c" stroke-width="1" fill="none"/><path d="M30 58 Q42 42 52 22 Q34 32 30 48" stroke="#b0a69c" stroke-width="1" fill="none"/></svg>`}
            </div>
            <div class="featured-content">
              <span class="tag">${f.category}</span>
              <h2>${f.title}</h2>
              <p>${f.excerpt}</p>
              <span class="meta">${f.date} · ${f.readTime} de lectura</span>
            </div>
          </a>`;

        const rest = posts.slice(1);
        if (!rest.length) {
          document.getElementById('posts-grid').innerHTML =
            '<p class="empty">Próximamente más entradas.</p>';
          return;
        }

        document.getElementById('posts-grid').innerHTML = rest.map(p => `
          <a href="post.html?id=${p.id}" class="post-card">
            <div class="post-card-img">
              ${p.image
                ? `<img src="${p.image}" alt="${p.title}" />`
                : `<svg width="40" height="52" viewBox="0 0 40 52" fill="none"><ellipse cx="20" cy="48" rx="1.5" ry="5" stroke="#b0a69c" stroke-width="1"/><path d="M20 43 Q10 32 4 18 Q18 24 20 35" stroke="#b0a69c" stroke-width="1" fill="none"/><path d="M20 39 Q30 28 36 14 Q22 22 20 33" stroke="#b0a69c" stroke-width="1" fill="none"/></svg>`}
            </div>
            <div class="post-card-body">
              <span class="tag">${p.category}</span>
              <h3>${p.title}</h3>
              <p>${p.excerpt}</p>
              <span class="meta">${p.date} · ${p.readTime}</span>
            </div>
          </a>`).join('');
      })
      .catch(() => {
        document.getElementById('featured-post').innerHTML =
          '<p style="color:var(--faint);font-size:14px;">No se pudieron cargar las entradas.</p>';
      });
  </script>

</body>
</html>
